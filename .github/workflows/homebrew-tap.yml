name: Publish Homebrew formula

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish to Homebrew
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to Homebrew
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish formula to tap
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: rbq/homebrew-tap
      RELEASE_TAG: ${{ inputs.tag }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify tap token access
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${HOMEBREW_TAP_REPOSITORY}" \
            >/dev/null

      - name: Determine release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"

          mkdir -p dist
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            "$archive_url" \
            --output dist/source.tar.gz
          sha256="$(shasum -a 256 dist/source.tar.gz | cut -d ' ' -f 1)"

          {
            echo "HOMEBREW_VERSION=$version"
            echo "HOMEBREW_ARCHIVE_URL=$archive_url"
            echo "HOMEBREW_ARCHIVE_SHA256=$sha256"
          } >> "$GITHUB_ENV"

      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          ruby -rerb -e '
            template = ERB.new(File.read(".homebrew/bon.rb.erb"), trim_mode: "-")
            rendered = template.result_with_hash(
              version: ENV.fetch("HOMEBREW_VERSION"),
              url: ENV.fetch("HOMEBREW_ARCHIVE_URL"),
              sha256: ENV.fetch("HOMEBREW_ARCHIVE_SHA256")
            )
            File.write("dist/bon.rb", rendered)
          '
          ruby -c dist/bon.rb

      - name: Check out tap repository
        uses: actions/checkout@v7
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: main
          path: tap

      - name: Update tap formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp dist/bon.rb tap/Formula/bon.rb

          cd tap
          git add Formula/bon.rb
          if git diff --cached --quiet -- Formula/bon.rb; then
            echo "Formula/bon.rb is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update bon to ${HOMEBREW_VERSION}"
          git push origin main

  build-bottles:
    name: Build bottle ${{ matrix.artifact_suffix }}
    needs: publish
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            artifact_suffix: macos-arm64
          - runner: macos-15-intel
            artifact_suffix: macos-x86_64
          - runner: ubuntu-24.04
            artifact_suffix: linux-x86_64
    env:
      HOMEBREW_TAP: rbq/tap
      HOMEBREW_TAP_REPOSITORY: rbq/homebrew-tap
      RELEASE_TAG: ${{ inputs.tag }}
      BOTTLE_ROOT_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}
    steps:
      - name: Set up Homebrew
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$RUNNER_OS" == "Linux" ]]; then
            if [[ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then
              NONINTERACTIVE=1 /bin/bash -c "$(curl --fail --silent --show-error --location https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            fi
            eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          elif [[ -x /opt/homebrew/bin/brew ]]; then
            eval "$(/opt/homebrew/bin/brew shellenv)"
          elif [[ -x /usr/local/bin/brew ]]; then
            eval "$(/usr/local/bin/brew shellenv)"
          else
            echo "Homebrew not found."
            exit 1
          fi

          echo "HOMEBREW_NO_ANALYTICS=1" >> "$GITHUB_ENV"
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix)/sbin" >> "$GITHUB_PATH"
          brew --version

      - name: Build bottle
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          eval "$(brew shellenv)"

          git config --global \
            url."https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

          brew update --quiet
          brew tap "$HOMEBREW_TAP" "https://github.com/${HOMEBREW_TAP_REPOSITORY}.git"

          tap_dir="$(brew --repository "$HOMEBREW_TAP")"
          git -C "$tap_dir" fetch origin main
          git -C "$tap_dir" checkout main
          git -C "$tap_dir" reset --hard origin/main

          brew install --build-bottle "$HOMEBREW_TAP/bon"
          brew test "$HOMEBREW_TAP/bon"
          brew bottle --json --root-url "$BOTTLE_ROOT_URL" "$HOMEBREW_TAP/bon"

          mkdir -p bottles
          mv ./*.bottle*.tar.gz ./*.bottle*.json bottles/

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottle-${{ matrix.artifact_suffix }}
          path: bottles/*
          if-no-files-found: error

  publish-bottles:
    name: Publish bottles
    needs: build-bottles
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      HOMEBREW_TAP: rbq/tap
      HOMEBREW_TAP_REPOSITORY: rbq/homebrew-tap
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Set up Homebrew
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -x /home/linuxbrew/.linuxbrew/bin/brew ]]; then
            NONINTERACTIVE=1 /bin/bash -c "$(curl --fail --silent --show-error --location https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"

          echo "HOMEBREW_NO_ANALYTICS=1" >> "$GITHUB_ENV"
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix)/sbin" >> "$GITHUB_PATH"
          brew --version

      - name: Download bottle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: homebrew-bottle-*
          path: bottles
          merge-multiple: true

      - name: Upload bottles to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" bottles/*.bottle.tar.gz --clobber --repo "$GITHUB_REPOSITORY"

      - name: Merge bottle metadata into tap formula
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail

          eval "$(brew shellenv)"

          git config --global \
            url."https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/".insteadOf \
            "https://github.com/"

          brew update --quiet
          brew tap "$HOMEBREW_TAP" "https://github.com/${HOMEBREW_TAP_REPOSITORY}.git"

          tap_dir="$(brew --repository "$HOMEBREW_TAP")"
          git -C "$tap_dir" fetch origin main
          git -C "$tap_dir" checkout main
          git -C "$tap_dir" reset --hard origin/main

          cd "$tap_dir"
          brew bottle --merge --write --no-commit --no-rebuild "$GITHUB_WORKSPACE"/bottles/*.bottle.json

          git add Formula/bon.rb
          if git diff --cached --quiet -- Formula/bon.rb; then
            echo "Formula/bon.rb bottle block is already up to date."
            exit 0
          fi

          version="${RELEASE_TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add bon ${version} bottles"
          git push origin main
