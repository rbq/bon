name: Publish Homebrew formula

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish to Homebrew
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish to Homebrew
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish formula to tap
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_REPOSITORY: rbq/homebrew-tap
      RELEASE_TAG: ${{ inputs.tag }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tap token access
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${HOMEBREW_TAP_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${HOMEBREW_TAP_REPOSITORY}" \
            >/dev/null

      - name: Determine release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          archive_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"
          download_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${tag}"

          mkdir -p dist
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 2 \
            --retry-all-errors \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GITHUB_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$download_url" \
            --output dist/source.tar.gz
          sha256="$(shasum -a 256 dist/source.tar.gz | cut -d ' ' -f 1)"

          {
            echo "HOMEBREW_VERSION=$version"
            echo "HOMEBREW_ARCHIVE_URL=$archive_url"
            echo "HOMEBREW_ARCHIVE_SHA256=$sha256"
          } >> "$GITHUB_ENV"

      - name: Render formula
        shell: bash
        run: |
          set -euo pipefail
          ruby -rerb -e '
            template = ERB.new(File.read(".homebrew/bon.rb.erb"), trim_mode: "-")
            rendered = template.result_with_hash(
              version: ENV.fetch("HOMEBREW_VERSION"),
              url: ENV.fetch("HOMEBREW_ARCHIVE_URL"),
              sha256: ENV.fetch("HOMEBREW_ARCHIVE_SHA256")
            )
            File.write("dist/bon.rb", rendered)
          '
          ruby -c dist/bon.rb

      - name: Check out tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: main
          path: tap

      - name: Update tap formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp dist/bon.rb tap/Formula/bon.rb

          cd tap
          if git diff --quiet -- Formula/bon.rb; then
            echo "Formula/bon.rb is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/bon.rb
          git commit -m "Update bon to ${HOMEBREW_VERSION}"
          git push origin main
