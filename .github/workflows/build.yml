name: Build and test

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up mise tools
        uses: jdx/mise-action@v2

      - name: Run specs
        run: mise run spec

  build:
    name: Build ${{ matrix.asset_suffix }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
          - os: macos-14
            asset_suffix: macos-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up mise tools
        uses: jdx/mise-action@v2

      - name: Build release binary
        run: mise run build

      - name: Verify binary
        shell: bash
        run: |
          set -euo pipefail
          shard_version="$(crystal eval 'require "yaml"; puts YAML.parse(File.read("shard.yml"))["version"].as_s')"
          binary_version="$(bin/bon-release --version)"
          test "$binary_version" = "bon $shard_version"
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            test "${GITHUB_REF_NAME#v}" = "$shard_version"
          fi

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ "$version" == "$GITHUB_REF_NAME" ]]; then
            version="$(crystal eval 'require "yaml"; puts YAML.parse(File.read("shard.yml"))["version"].as_s')"
          fi
          asset="bon-${version}-${{ matrix.asset_suffix }}"
          mkdir -p "dist/$asset"
          cp bin/bon-release "dist/$asset/bon"
          cp README.md CHANGELOG.md LICENSE "dist/$asset/"
          chmod 755 "dist/$asset/bon"
          tar -C dist -czf "dist/$asset.tar.gz" "$asset"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: bon-${{ matrix.asset_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit
