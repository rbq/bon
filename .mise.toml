[env]
_.path = "./bin"

[tools]
crystal = "1.20.2"
git-cliff = "latest"
tinytex = "2026.06"
typst = "0.14.2"

[bootstrap.packages]
"brew:ghostscript" = "latest"

[tasks.run]
description = "Run the bon receipt-printer CLI"
run = "crystal run src/bon.cr --"

[tasks.bon]
description = "Run the local bon CLI from Crystal source"
run = "crystal run src/bon.cr --"

[tasks.build]
description = "Build the production bon executable without debug symbols"
run = "mkdir -p bin && rm -f bin/bon-release.dwarf && crystal build src/bon.cr --release --no-debug -o bin/bon-release"

[tasks.build-debug]
description = "Build the bon executable with debug symbols"
run = "mkdir -p bin && crystal build src/bon.cr -o bin/bon-debug"

[tasks.install]
description = "Build and install the production bon executable"
run = "mise run build && bin/bon-install-local"

[tasks.uninstall]
description = "Remove the project-local bon executable from ~/.local/bin"
run = "bin/bon-uninstall-local"

[tasks.spec]
description = "Run Crystal specs"
run = "crystal spec"
