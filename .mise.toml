[env]
_.path = "./bin"

[tools]
crystal = "1.20.2"
tinytex = "2026.06"
typst = "0.14.2"

[bootstrap.packages]
"brew:ghostscript" = "latest"

[tasks.run]
description = "Run the bon receipt-printer CLI"
run = "crystal run src/bon.cr --"

[tasks.build]
description = "Build the production bon executable without debug symbols"
run = "mkdir -p bin && rm -f bin/bon.dwarf && crystal build src/bon.cr --release --no-debug -o bin/bon"

[tasks.build-debug]
description = "Build the bon executable with debug symbols"
run = "mkdir -p bin && crystal build src/bon.cr -o bin/bon"

[tasks.install]
description = "Build and install the production bon executable"
run = "mkdir -p bin && rm -f bin/bon.dwarf && crystal build src/bon.cr --release --no-debug -o bin/bon && mkdir -p \"$HOME/.local/bin\" && cp bin/bon \"$HOME/.local/bin/bon\" && chmod 755 \"$HOME/.local/bin/bon\""

[tasks.spec]
description = "Run Crystal specs"
run = "crystal spec"
