[printer]
name = ""
candidates = ["EPSON_TM_m30III", "EPSON_TM_m30III__USB_"]

[paper]
width_mm = 80.0
printable_width_pt = 0.0 # auto: 58 mm => 384 dots, 80 mm => 576 dots
min_media_pt = 72.0
max_media_height_pt = 5669.3

[render]
typst_bin = "typst"
typst_mode = "pdf"
image_ppi = 203
raster_ppi_multiplier = 2
latex_engine = "auto"

[simulate]
background_tint = "#f5f1e0"

[cups]
copies = 1
dry_run = false

[cups.options]
Resolution = "203x203dpi"
TmxPaperCut = "CutPerPage" # NoCut/CutPerJob/CutPerPage
TmxPaperReduction = "Off" # Off/Top/Bottom/Both
